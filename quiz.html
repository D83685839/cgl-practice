<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Take a mixed quiz across multiple SSC CGL topics">
  <title>Mixed Quiz · CGL Practice</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="wrap">

    <a href="index.html" class="back-btn">
      <span>←</span>
      <span>Back to Home</span>
    </a>

    <div class="section-title">Mixed Quiz</div>
    <p style="color: var(--t2); font-size: 14px; margin-bottom: 2rem;">
      20 random questions from multiple chapters. Answer all questions and submit to see your score.
    </p>

    <form id="quizForm"></form>

    <button 
      onclick="submitQuiz()" 
      class="quiz-btn"
      style="width: 100%; justify-content: center; gap: 8px; margin: 2rem 0;"
      type="button">
      <span>Submit Quiz</span>
      <span>→</span>
    </button>

    <div id="score" style="display: none; text-align: center; padding: 2rem; background: var(--bg); border-radius: 14px; border: 1px solid var(--bd);"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
