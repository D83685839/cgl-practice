<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSC CGL Quant Practice</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="wrap">

  <!-- HERO -->
  <div class="hero">
    <h1>SSC CGL <span>Quant</span> Practice</h1>
    <p>25 chapters · master every topic before exam day</p>

    <div class="search-bar">
      <svg width="14" height="14" viewBox="0 0 14 14">
        <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.2"/>
        <path d="M10 10L13 13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <input type="text" id="search" placeholder="Search chapter..." oninput="filterCards(this.value)">
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat">
      <div class="num" style="color:var(--accent)">25</div>
      <div class="lbl">Chapters</div>
    </div>
    <div class="stat">
      <div class="num" style="color:var(--accent2)">500+</div>
      <div class="lbl">Questions</div>
    </div>
    <div class="stat">
      <div class="num" style="color:var(--accent3)">Tier I/II</div>
      <div class="lbl">Level</div>
    </div>
  </div>

  <!-- TITLE -->
  <div class="section-title">Practice by Chapter</div>

  <!-- GRID -->
  <div class="grid" id="grid"></div>

  <!-- QUIZ BUTTON -->
  <a href="quiz.html" class="quiz-btn">
    <div>
      <div style="font-size:12px;opacity:0.8;font-weight:500;margin-bottom:2px">
        Ready for a challenge?
      </div>
      Start Mixed Quiz
    </div>
    <div class="right">→</div>
  </a>

</div>

<script>
const chapters = [ /* SAME DATA (no change needed) */ ];

function renderCards(list) {
  const g = document.getElementById('grid');

  g.innerHTML = list.map(c => `
    <a href="chapter.html?chapter=${c.slug}" 
       class="card" 
       style="--card-color:${c.color}">

      <div class="icon">${c.icon}</div>

      <div class="name">${c.name}</div>

      <div class="badge" 
           style="background:${c.color}22;color:${c.color}">
        ${c.tag}
      </div>

    </a>
  `).join('');
}

function filterCards(q) {
  const f = chapters.filter(c =>
    c.name.toLowerCase().includes(q.toLowerCase()) ||
    c.tag.toLowerCase().includes(q.toLowerCase())
  );
  renderCards(f);
}

renderCards(chapters);
</script>

</body>
</html>
