<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Master SSC CGL quantitative aptitude with 500+ practice questions across 25 chapters">
  <title>SSC CGL Quant Practice</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="wrap">

    <!-- HERO -->
    <div class="hero">
      <h1>SSC CGL <span>Quant</span> Practice</h1>
      <p>25 chapters · master every topic before exam day</p>

      <div class="search-bar">
        <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
          <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.2" fill="none"/>
          <path d="M10 10L13 13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        <input 
          type="text" 
          id="search" 
          placeholder="Search chapter..." 
          aria-label="Search chapters"
          oninput="filterCards(this.value)">
      </div>
    </div>

    <!-- STATS -->
    <div class="stats-row" aria-label="Platform statistics">
      <div class="stat">
        <div class="num" style="color: var(--accent)">25</div>
        <div class="lbl">Chapters</div>
      </div>

      <div class="stat">
        <div class="num" style="color: var(--accent2)">500+</div>
        <div class="lbl">Questions</div>
      </div>

      <div class="stat">
        <div class="num" style="color: var(--accent3)">Tier I/II</div>
        <div class="lbl">Level</div>
      </div>
    </div>

    <!-- SECTION TITLE -->
    <div class="section-title">Practice by Chapter</div>

    <!-- GRID -->
    <div class="grid" id="grid" role="list"></div>

    <!-- QUIZ BUTTON -->
    <a href="quiz.html" class="quiz-btn">
      <div>
        <div class="quiz-subtitle">Ready for a challenge?</div>
        <span>Start Mixed Quiz</span>
      </div>
      <span class="arrow" aria-hidden="true">→</span>
    </a>

  </div>

  <script src="script.js"></script>
</body>
</html>
